<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,700&amp;family=Source+Sans+Pro:wght@200;300;400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary-container": "#fdfcff",
                    "on-error-container": "#93000a",
                    "inverse-on-surface": "#f1f1f0",
                    "surface-container-highest": "#e2e2e2",
                    "on-secondary": "#ffffff",
                    "secondary-fixed": "#ffdbce",
                    "error": "#ba1a1a",
                    "error-container": "#ffdad6",
                    "surface-tint": "#a73a00",
                    "on-secondary-container": "#772f0f",
                    "on-primary": "#ffffff",
                    "on-error": "#ffffff",
                    "inverse-primary": "#ffb599",
                    "on-background": "#1a1c1c",
                    "tertiary-fixed": "#d4e3ff",
                    "surface-bright": "#f9f9f8",
                    "secondary-container": "#ff9971",
                    "on-secondary-fixed-variant": "#793110",
                    "outline": "#8e7166",
                    "on-tertiary": "#ffffff",
                    "surface": "#f9f9f8",
                    "on-surface": "#1a1c1c",
                    "primary-fixed": "#ffdbce",
                    "surface-variant": "#e2e2e2",
                    "on-tertiary-fixed": "#001c39",
                    "inverse-surface": "#2f3130",
                    "surface-container-high": "#e8e8e7",
                    "tertiary-fixed-dim": "#a4c9ff",
                    "on-primary-fixed-variant": "#7f2b00",
                    "on-tertiary-fixed-variant": "#004883",
                    "on-surface-variant": "#5a4138",
                    "on-primary-container": "#fffbff",
                    "tertiary-container": "#0076d2",
                    "surface-dim": "#dadad9",
                    "surface-container": "#eeeeed",
                    "on-secondary-fixed": "#370e00",
                    "tertiary": "#005da8",
                    "outline-variant": "#e2bfb2",
                    "on-primary-fixed": "#370e00",
                    "secondary": "#974726",
                    "primary-fixed-dim": "#ffb599",
                    "background": "#f9f9f8",
                    "surface-container-low": "#f3f4f3",
                    "secondary-fixed-dim": "#ffb599",
                    "surface-container-lowest": "#ffffff",
                    "primary": "#a33900",
                    "primary-container": "#cc4900"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Playfair Display", "serif"],
                    "body": ["Source Sans Pro", "sans-serif"],
                    "label": ["Source Sans Pro", "sans-serif"]
            }
          },
        },
      }
    </script>
<style type="text/tailwindcss">
        body { font-family: 'Source Sans Pro', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }
        .input-focus-effect:focus-within {
            box-shadow: 0 0 0 1.5px #a33900;
        }
        h1, h2, .font-playfair { font-family: 'Playfair Display', serif; }
        label, .font-source-sans { font-family: 'Source Sans Pro', sans-serif; }
    </style>
</head>
<body class="bg-background text-on-surface antialiased overflow-hidden">
<main class="relative h-screen w-full flex overflow-hidden">
<div class="absolute inset-0 z-0">
<img alt="Luxury shopping bags and high-end retail interior" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDqAfMy8pahmNaMpbyTjSUvTWMimrEy3SpVnWBb6cpRXwee86aTgE-RCGjRbghCX9fiYapeO0K8G0GLWz0X2SkezTIHUL4GqNC-pHZ9wbdItBlUK3kF4vQNbfk-hMUIO3zvA-KS4b47IcYHxNhkY_l2eIlW9wup6BNm2lHsX6K0GbdSjKgEXMI1y9UIGNAHFy01zFNeTSyVJSancIsbbZ7T-hTxjsJV581xvOhcrHBtpLnfIOOYGT96eRM_eWBwOZuW3h4Okar5pW0" style=""/>
<div class="absolute inset-0 bg-gradient-to-r from-background/40 to-transparent"></div>
</div>
<div class="flex-grow flex items-center px-12 md:px-24 z-10">
<div class="max-w-xl">
<h2 class="text-on-surface-variant font-label text-sm uppercase tracking-[0.2em] mb-4" style="color: white; opacity: 0.8;">MEMBERSHIP</h2>
<h1 class="text-on-surface font-headline text-5xl md:text-7xl font-bold tracking-tight leading-none mb-6" style="">
                Join the <br/>
<span class="text-primary italic" style="">Elite Circle</span>
</h1>
<p class="text-lg max-w-sm leading-relaxed font-body text-white drop-shadow-sm" style="">
                Access curated luxury experiences and private collections tailored for the discerning few.
            </p>
</div>
</div>
<aside class="fixed top-0 right-0 h-full w-full md:w-[32rem] glass-panel shadow-[0px_20px_40px_rgba(26,28,28,0.12)] flex flex-col p-8 md:p-12 z-50">
<div class="flex justify-between items-center mb-12">
<div class="flex flex-col">
<span class="text-2xl font-headline font-black tracking-tighter text-black" style="">Snitch</span>
</div>
<a class="text-black/60 hover:text-black transition-colors" href="#" style="">
<span class="material-symbols-outlined" style="">close</span>
</a>
</div>
<div class="flex-grow flex flex-col justify-center">
<header class="mb-10">
<h2 class="text-3xl font-headline font-bold tracking-tight mb-2 text-black" style="">Create Account</h2>
</header>
<form class="space-y-6">
<div class="space-y-1">
<label class="block text-xs font-label font-bold uppercase tracking-wider ml-1 text-black" style="">Full Name</label>
<div class="relative">
<input class="w-full font-body bg-white border-0 rounded-xl px-5 py-4 text-black focus:ring-0 input-focus-effect transition-all duration-300 shadow-sm placeholder:text-zinc-400" placeholder="Julian Sterling" type="text"/>
</div>
</div>
<div class="space-y-1">
<label class="block text-xs font-label font-bold uppercase tracking-wider ml-1 text-black" style="">Email Address</label>
<div class="relative">
<input class="w-full font-body bg-white border-0 rounded-xl px-5 py-4 text-black focus:ring-0 input-focus-effect transition-all duration-300 shadow-sm placeholder:text-zinc-400" placeholder="sterling@curator.com" type="email"/>
</div>
</div>
<div class="space-y-1">
<label class="block text-xs font-label font-bold uppercase tracking-wider ml-1 text-black" style="">Contact Number</label>
<div class="relative">
<input class="w-full font-body bg-white border-0 rounded-xl px-5 py-4 text-black focus:ring-0 input-focus-effect transition-all duration-300 shadow-sm placeholder:text-zinc-400" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<div class="space-y-1">
<label class="block text-xs font-label font-bold uppercase tracking-wider ml-1 text-black" style="">Password</label>
<input class="w-full font-body bg-white border-0 rounded-xl px-5 py-4 text-black focus:ring-0 input-focus-effect transition-all duration-300 shadow-sm placeholder:text-zinc-400" placeholder="••••••••" type="password"/>
</div>
<div class="pt-4">
<button class="w-full font-label bg-gradient-to-b from-primary to-primary-container text-white py-5 rounded-xl font-bold tracking-wide shadow-xl active:scale-[0.98] transition-all duration-200" style="">
                        Create Master Account
                    </button>
</div>
</form>
</div>
</aside>
</main>
<footer class="fixed bottom-0 left-0 w-[calc(100%-32rem)] p-8 flex justify-between items-center z-20 pointer-events-none">
<div class="text-xs font-label font-bold uppercase tracking-[0.05em] text-zinc-500 pointer-events-auto" style="">
        © 2024 Snitch E-commerce. All rights reserved.
    </div>
<div class="flex gap-8 pointer-events-auto">
<a class="text-xs font-label font-bold uppercase tracking-[0.05em] text-zinc-500 hover:text-primary transition-all" href="#" style="">Instagram</a>
<a class="text-xs font-label font-bold uppercase tracking-[0.05em] text-zinc-500 hover:text-primary transition-all" href="#" style="">Journal</a>
</div>
</footer>
</body></html>
